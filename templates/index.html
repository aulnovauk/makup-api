<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Makeup AI — Real-time Virtual Try-On</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0d0d12;
    --surface:   #16161e;
    --surface2:  #1e1e2a;
    --border:    rgba(255,255,255,0.08);
    --accent:    #c97eb2;
    --accent2:   #7eb2c9;
    --text:      #f0edf5;
    --text-muted:#8a8699;
    --radius:    12px;
    --radius-sm: 8px;
    --shadow:    0 8px 32px rgba(0,0,0,0.5);
  }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-weight:300; min-height:100vh; overflow-x:hidden; }

  header { display:flex; align-items:center; justify-content:space-between; padding:18px 32px; border-bottom:1px solid var(--border); background:rgba(13,13,18,0.95); backdrop-filter:blur(12px); position:sticky; top:0; z-index:100; }
  .logo { display:flex; align-items:center; gap:10px; font-family:'Playfair Display',serif; font-size:22px; letter-spacing:0.02em; }
  .logo-dot { width:10px; height:10px; background:var(--accent); border-radius:50%; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  .header-status { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-muted); }
  .status-dot { width:7px; height:7px; border-radius:50%; background:#3fcf6a; }
  .status-dot.offline { background:#cf3f3f; }

  .layout { display:grid; grid-template-columns:1fr 320px; height:calc(100vh - 61px); overflow:hidden; }
  .preview-panel { background:#080810; display:flex; flex-direction:column; position:relative; }

  .mode-tabs { display:flex; border-bottom:1px solid var(--border); }
  .tab-btn { flex:1; padding:14px 0; background:none; border:none; border-bottom:2px solid transparent; color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500; cursor:pointer; transition:all 0.2s; letter-spacing:0.04em; text-transform:uppercase; }
  .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

  .preview-area { flex:1; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  #videoEl { display:none; }
  #canvasEl { width:100%; height:100%; object-fit:cover; display:block; }
  #photoImg { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; display:none; }

  .preview-placeholder { display:flex; flex-direction:column; align-items:center; gap:16px; color:var(--text-muted); }
  .preview-placeholder svg { opacity:0.3; }
  .preview-placeholder p { font-size:14px; }

  /* ── Overlay badges ── */
  .fps-badge {
    position:absolute; top:14px; left:14px;
    background:rgba(0,0,0,0.7); border:1px solid var(--border);
    border-radius:6px; padding:4px 10px; font-size:11px; font-weight:500;
    color:#3fcf6a; font-variant-numeric:tabular-nums; letter-spacing:0.05em; display:none;
  }
  .latency-badge {
    position:absolute; top:14px; left:90px;
    background:rgba(0,0,0,0.7); border:1px solid var(--border);
    border-radius:6px; padding:4px 10px; font-size:11px;
    color:var(--text-muted); font-variant-numeric:tabular-nums; display:none;
  }
  .latency-badge.slow { color:#f4a261; }
  .latency-badge.bad  { color:#e07070; }

  .processing-badge {
    position:absolute; top:14px; right:14px;
    background:rgba(201,126,178,0.15); border:1px solid rgba(201,126,178,0.3);
    border-radius:6px; padding:4px 12px; font-size:11px; color:var(--accent);
    display:none; align-items:center; gap:6px;
  }
  .spinner { width:10px; height:10px; border:1.5px solid rgba(201,126,178,0.3); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .controls-bar { padding:14px 20px; border-top:1px solid var(--border); display:flex; align-items:center; gap:10px; background:var(--surface); }
  .btn { display:flex; align-items:center; gap:7px; padding:9px 18px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface2); color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .btn:hover { background:rgba(255,255,255,0.07); border-color:rgba(255,255,255,0.15); }
  .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:500; }
  .btn.primary:hover { filter:brightness(1.1); }
  .btn.danger { background:rgba(207,63,63,0.15); border-color:rgba(207,63,63,0.4); color:#e07070; }
  .btn.danger:hover { background:rgba(207,63,63,0.25); }
  .btn svg { flex-shrink:0; }
  .btn-spacer { flex:1; }
  #photoUploadInput { display:none; }

  /* ── Controls panel ── */
  .controls-panel { background:var(--surface); border-left:1px solid var(--border); overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  .controls-panel::-webkit-scrollbar { width:4px; }
  .controls-panel::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .looks-section { padding:18px 18px 18px; border-bottom:1px solid var(--border); }
  .section-title { font-size:10px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-muted); margin-bottom:12px; }
  .looks-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .look-btn { padding:10px 0; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface2); color:var(--text); font-family:'DM Sans',sans-serif; font-size:12px; cursor:pointer; transition:all 0.18s; text-align:center; }
  .look-btn:hover { border-color:var(--accent); color:var(--accent); }
  .look-btn.active { background:rgba(201,126,178,0.12); border-color:var(--accent); color:var(--accent); }

  .layer-section { border-bottom:1px solid var(--border); overflow:hidden; }
  .layer-header { display:flex; align-items:center; padding:14px 18px; cursor:pointer; gap:10px; user-select:none; }
  .layer-header:hover { background:rgba(255,255,255,0.03); }
  .toggle { position:relative; width:34px; height:18px; flex-shrink:0; }
  .toggle input { opacity:0; width:0; height:0; }
  .toggle-track { position:absolute; inset:0; background:var(--surface2); border:1px solid var(--border); border-radius:9px; transition:background 0.2s; cursor:pointer; }
  .toggle input:checked ~ .toggle-track { background:var(--accent); border-color:var(--accent); }
  .toggle-thumb { position:absolute; top:2px; left:2px; width:12px; height:12px; background:#fff; border-radius:50%; transition:transform 0.2s; pointer-events:none; }
  .toggle input:checked ~ .toggle-track .toggle-thumb { transform:translateX(16px); }
  .layer-name { flex:1; font-size:13px; }
  .layer-chevron { color:var(--text-muted); transition:transform 0.2s; flex-shrink:0; }
  .layer-section.open .layer-chevron { transform:rotate(180deg); }
  .layer-body { display:none; padding:4px 18px 16px; flex-direction:column; gap:12px; }
  .layer-section.open .layer-body { display:flex; }

  .swatches { display:flex; flex-wrap:wrap; gap:8px; }
  .swatch { width:28px; height:28px; border-radius:50%; border:2px solid transparent; cursor:pointer; transition:transform 0.15s, border-color 0.15s; flex-shrink:0; }
  .swatch:hover { transform:scale(1.15); }
  .swatch.active { border-color:#fff; transform:scale(1.1); }

  .slider-row { display:flex; align-items:center; gap:10px; }
  .slider-label { font-size:11px; color:var(--text-muted); min-width:52px; letter-spacing:0.03em; }
  .slider-val { font-size:11px; color:var(--text-muted); min-width:30px; text-align:right; font-variant-numeric:tabular-nums; }
  input[type=range] { flex:1; height:3px; -webkit-appearance:none; background:var(--surface2); border-radius:2px; outline:none; cursor:pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--accent); cursor:pointer; transition:transform 0.15s; }
  input[type=range]::-webkit-slider-thumb:hover { transform:scale(1.2); }

  .ba-section { padding:14px 18px; border-bottom:1px solid var(--border); }
  .ba-row { display:flex; align-items:center; justify-content:space-between; }
  .ba-label { font-size:11px; color:var(--text-muted); letter-spacing:0.08em; text-transform:uppercase; }

  #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:10px 20px; border-radius:var(--radius-sm); font-size:13px; transition:transform 0.3s ease; z-index:999; white-space:nowrap; pointer-events:none; }
  #toast.show { transform:translateX(-50%) translateY(0); }

  @media (max-width:800px) {
    .layout { grid-template-columns:1fr; height:auto; overflow:visible; }
    .controls-panel { border-left:none; border-top:1px solid var(--border); max-height:60vh; }
    .preview-panel { height:50vh; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>Makeup AI</div>
  <div class="header-status">
    <div class="status-dot" id="engineStatus"></div>
    <span id="engineLabel">Checking...</span>
  </div>
</header>

<div class="layout">
  <div class="preview-panel">
    <div class="mode-tabs">
      <button class="tab-btn active" onclick="switchMode('camera')" id="tabCamera">Live Camera</button>
      <button class="tab-btn" onclick="switchMode('photo')" id="tabPhoto">Photo Upload</button>
    </div>

    <div class="preview-area" id="previewArea">
      <video id="videoEl" autoplay muted playsinline></video>
      <canvas id="canvasEl"></canvas>
      <img id="photoImg" alt="Uploaded photo">

      <div class="preview-placeholder" id="placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <p>Start camera or upload a photo</p>
      </div>

      <div class="fps-badge"     id="fpsBadge">0 fps</div>
      <div class="latency-badge" id="latencyBadge">-- ms</div>
      <div class="processing-badge" id="processingBadge">
        <div class="spinner"></div>Processing
      </div>
    </div>

    <div class="controls-bar">
      <div id="cameraControls" style="display:flex;gap:10px;width:100%;align-items:center">
        <button class="btn primary" id="startBtn" onclick="startCamera()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Start Camera
        </button>
        <button class="btn danger" id="stopBtn" onclick="stopCamera()" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          Stop
        </button>
        <div class="btn-spacer"></div>
        <button class="btn" onclick="saveScreenshot()" id="screenshotBtn" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Screenshot
        </button>
      </div>
      <div id="photoControls" style="display:none;gap:10px;width:100%;align-items:center">
        <button class="btn primary" onclick="document.getElementById('photoUploadInput').click()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload Photo
        </button>
        <input type="file" id="photoUploadInput" accept="image/*" onchange="handlePhotoUpload(event)">
        <div class="btn-spacer"></div>
        <button class="btn" onclick="saveScreenshot()" id="photoSaveBtn" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Save Result
        </button>
      </div>
    </div>
  </div>

  <div class="controls-panel">
    <div class="looks-section">
      <div class="section-title">Looks</div>
      <div class="looks-grid">
        <button class="look-btn" onclick="applyLook('natural')">Natural</button>
        <button class="look-btn" onclick="applyLook('glam')">Glam</button>
        <button class="look-btn" onclick="applyLook('smoky')">Smoky</button>
        <button class="look-btn" onclick="applyLook('fresh')">Fresh</button>
      </div>
    </div>

    <div class="ba-section">
      <div class="ba-row">
        <span class="ba-label">Before / After</span>
        <label class="toggle">
          <input type="checkbox" id="baToggle" onchange="toggleBA(this.checked)">
          <div class="toggle-track"><div class="toggle-thumb"></div></div>
        </label>
      </div>
    </div>

    <!-- Lipstick -->
    <div class="layer-section open" id="layerLipstick">
      <div class="layer-header" onclick="toggleLayer('Lipstick')">
        <label class="toggle" onclick="event.stopPropagation()"><input type="checkbox" id="togLipstick" checked onchange="updateParam('lipstick','enabled',this.checked)"><div class="toggle-track"><div class="toggle-thumb"></div></div></label>
        <span class="layer-name">Lipstick</span>
        <svg class="layer-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="layer-body">
        <div class="swatches" id="swatchesLipstick"></div>
        <div class="slider-row"><span class="slider-label">Opacity</span><input type="range" min="5" max="95" value="45" oninput="updateParam('lipstick','opacity',this.value/100);this.nextElementSibling.textContent=this.value+'%'"><span class="slider-val">45%</span></div>
      </div>
    </div>

    <!-- Lip Liner -->
    <div class="layer-section" id="layerLipLiner">
      <div class="layer-header" onclick="toggleLayer('LipLiner')">
        <label class="toggle" onclick="event.stopPropagation()"><input type="checkbox" id="togLipLiner" onchange="updateParam('lip_liner','enabled',this.checked)"><div class="toggle-track"><div class="toggle-thumb"></div></div></label>
        <span class="layer-name">Lip Liner</span>
        <svg class="layer-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="layer-body">
        <div class="slider-row"><span class="slider-label">Intensity</span><input type="range" min="5" max="95" value="60" oninput="updateParam('lip_liner','opacity',this.value/100);this.nextElementSibling.textContent=this.value+'%'"><span class="slider-val">60%</span></div>
      </div>
    </div>

    <!-- Eyeshadow -->
    <div class="layer-section" id="layerEyeshadow">
      <div class="layer-header" onclick="toggleLayer('Eyeshadow')">
        <label class="toggle" onclick="event.stopPropagation()"><input type="checkbox" id="togEyeshadow" onchange="updateParam('eyeshadow','enabled',this.checked)"><div class="toggle-track"><div class="toggle-thumb"></div></div></label>
        <span class="layer-name">Eyeshadow</span>
        <svg class="layer-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="layer-body">
        <div class="swatches" id="swatchesEyeshadow"></div>
        <div class="slider-row"><span class="slider-label">Opacity</span><input type="range" min="5" max="90" value="30" oninput="updateParam('eyeshadow','opacity',this.value/100);this.nextElementSibling.textContent=this.value+'%'"><span class="slider-val">30%</span></div>
      </div>
    </div>

    <!-- Eyebrow -->
    <div class="layer-section" id="layerEyebrow">
      <div class="layer-header" onclick="toggleLayer('Eyebrow')">
        <label class="toggle" onclick="event.stopPropagation()"><input type="checkbox" id="togEyebrow" onchange="updateParam('eyebrow','enabled',this.checked)"><div class="toggle-track"><div class="toggle-thumb"></div></div></label>
        <span class="layer-name">Eyebrow Fill</span>
        <svg class="layer-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="layer-body">
        <div class="swatches" id="swatchesEyebrow"></div>
        <div class="slider-row"><span class="slider-label">Opacity</span><input type="range" min="10" max="80" value="45" oninput="updateParam('eyebrow','opacity',this.value/100);this.nextElementSibling.textContent=this.value+'%'"><span class="slider-val">45%</span></div>
      </div>
    </div>

    <!-- Blush -->
    <div class="layer-section" id="layerBlush">
      <div class="layer-header" onclick="toggleLayer('Blush')">
        <label class="toggle" onclick="event.stopPropagation()"><input type="checkbox" id="togBlush" onchange="updateParam('blush','enabled',this.checked)"><div class="toggle-track"><div class="toggle-thumb"></div></div></label>
        <span class="layer-name">Blush</span>
        <svg class="layer-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="layer-body">
        <div class="swatches" id="swatchesBlush"></div>
        <div class="slider-row"><span class="slider-label">Opacity</span><input type="range" min="5" max="60" value="20" oninput="updateParam('blush','opacity',this.value/100);this.nextElementSibling.textContent=this.value+'%'"><span class="slider-val">20%</span></div>
      </div>
    </div>

    <!-- Highlighter -->
    <div class="layer-section" id="layerHighlighter">
      <div class="layer-header" onclick="toggleLayer('Highlighter')">
        <label class="toggle" onclick="event.stopPropagation()"><input type="checkbox" id="togHighlighter" onchange="updateParam('highlighter','enabled',this.checked)"><div class="toggle-track"><div class="toggle-thumb"></div></div></label>
        <span class="layer-name">Highlighter</span>
        <svg class="layer-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="layer-body">
        <div class="slider-row"><span class="slider-label">Intensity</span><input type="range" min="5" max="60" value="25" oninput="updateParam('highlighter','opacity',this.value/100);this.nextElementSibling.textContent=this.value+'%'"><span class="slider-val">25%</span></div>
      </div>
    </div>

    <!-- Contour -->
    <div class="layer-section" id="layerContour">
      <div class="layer-header" onclick="toggleLayer('Contour')">
        <label class="toggle" onclick="event.stopPropagation()"><input type="checkbox" id="togContour" onchange="updateParam('contour','enabled',this.checked)"><div class="toggle-track"><div class="toggle-thumb"></div></div></label>
        <span class="layer-name">Contour</span>
        <svg class="layer-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="layer-body">
        <div class="slider-row"><span class="slider-label">Intensity</span><input type="range" min="5" max="60" value="20" oninput="updateParam('contour','opacity',this.value/100);this.nextElementSibling.textContent=this.value+'%'"><span class="slider-val">20%</span></div>
      </div>
    </div>

    <!-- Foundation -->
    <div class="layer-section" id="layerFoundation">
      <div class="layer-header" onclick="toggleLayer('Foundation')">
        <label class="toggle" onclick="event.stopPropagation()"><input type="checkbox" id="togFoundation" onchange="updateParam('foundation','enabled',this.checked)"><div class="toggle-track"><div class="toggle-thumb"></div></div></label>
        <span class="layer-name">Foundation</span>
        <svg class="layer-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="layer-body">
        <div class="slider-row"><span class="slider-label">Coverage</span><input type="range" min="5" max="40" value="12" oninput="updateParam('foundation','opacity',this.value/100);this.nextElementSibling.textContent=this.value+'%'"><span class="slider-val">12%</span></div>
        <div class="slider-row"><span class="slider-label">Smooth</span><label class="toggle" style="margin-left:auto"><input type="checkbox" id="togSmooth" checked onchange="updateParam('foundation','smooth',this.checked)"><div class="toggle-track"><div class="toggle-thumb"></div></div></label></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
const state = {
  lipstick:    { enabled:true,  opacity:0.55, color:[30,20,200]   },
  lip_liner:   { enabled:false, opacity:0.65, color:[30,20,200]   },
  eyeshadow:   { enabled:false, opacity:0.45, color:[100,110,160] },  // brighter default
  eyebrow:     { enabled:false, opacity:0.55, color:[30,45,80]    },
  blush:       { enabled:false, opacity:0.40, color:[140,130,230] },  // was 0.20
  highlighter: { enabled:false, opacity:0.55 },                        // was 0.25
  contour:     { enabled:false, opacity:0.40 },                        // was 0.20
  foundation:  { enabled:false, opacity:0.14, smooth:true },
};

const PRESETS = {
  lipstick:  { red_rose:{bgr:[30,20,200],hex:'#c81428',label:'Red Rose'}, pink_blush:{bgr:[150,100,220],hex:'#dc6496',label:'Pink'}, coral_sunset:{bgr:[80,100,240],hex:'#f06450',label:'Coral'}, berry_wine:{bgr:[60,20,130],hex:'#821432',label:'Berry'}, nude_beige:{bgr:[130,150,190],hex:'#be9682',label:'Nude'}, deep_plum:{bgr:[80,30,100],hex:'#641e50',label:'Plum'} },
  eyeshadow: { smoky_brown:{bgr:[40,60,100],hex:'#643c28',label:'Smoky'}, rose_gold:{bgr:[100,120,200],hex:'#c87864',label:'Rose Gold'}, ocean_blue:{bgr:[180,100,50],hex:'#3264b4',label:'Blue'}, forest_green:{bgr:[60,130,60],hex:'#3c823c',label:'Green'}, purple_haze:{bgr:[150,60,130],hex:'#823c96',label:'Purple'} },

    // CRITICAL FIX: lighter grey-purple for eyeshadow (screen blend shows on dark skin)
    // Dark [40,60,100] was invisible — lighter [100,110,160] shows via screen blend
    eyeshadow:   {enabled:true, opacity:0.70, color:[100,110,160]},
    eyebrow:     {enabled:true, opacity:0.65, color:[30,45,80]},
    blush:       {enabled:true, opacity:0.40, color:[80,110,170]},

// ════════════════════════════════════════════════════════
//  CAMERA PIPELINE — DECOUPLED SSE ARCHITECTURE
// ════════════════════════════════════════════════════════
/*
  OLD (broken — gated on server latency):
    capture frame → await POST → wait for response → render → repeat
    Effective FPS = 1000 / server_ms → 3-5 fps at 720p

  NEW (production — fully decoupled):
    ┌─ rAF render loop (60fps) ──── always draws lastMakeupImg ──────┐
    │                                                                  │
    │  push loop (interval) ─── fire-and-forget POST ──▶ server ───┐ │
    │                                                               │ │
    │  SSE listener ◀─────── result whenever ready ────────────────┘ │
    └──────────────────────────────────────────────────────────────────┘

  Key guarantees:
  • rAF NEVER awaits server → canvas always at 60fps
  • POST returns 202 immediately → push loop never blocks
  • Ring buffer on server → only newest frame processed, never stale
  • Adaptive sendWidth: server tells client what resolution to send
    based on measured avg_ms → 640px / 480px / 320px auto-switched
  • SSE reconnects automatically on disconnect
*/

let mode          = 'camera';
let stream        = null;
let animFrame     = null;
let showBA        = false;
let lastRawFrame  = null;
let lastResult    = null;
let lastMakeupImg = null;   // Image object ready to draw
let fpsSmooth     = 0;
let lastFrameT    = 0;

// Adaptive send resolution — updated by server feedback
let sendWidth     = 480;   // start conservative, server will tune up/down
let avgMs         = 0;

// SSE connection management
let sseSource     = null;
let sseConnected  = false;

// Push loop — interval-based, completely independent of rAF
let pushInterval  = null;
let pushCanvas    = null;   // reusable off-screen canvas for encoding

// ── Canvas helpers ────────────────────────────────────────
function getPushCanvas() {
  if (!pushCanvas) pushCanvas = document.createElement('canvas');
  return pushCanvas;
}

function captureScaledFrame(vid, targetWidth) {
  const scale = Math.min(1.0, targetWidth / vid.videoWidth);
  const w = Math.round(vid.videoWidth  * scale);
  const h = Math.round(vid.videoHeight * scale);
  const c = getPushCanvas();
  c.width  = w;
  c.height = h;
  const ctx = c.getContext('2d');
  ctx.save();
  ctx.scale(-1, 1);                       // mirror for natural camera view
  ctx.drawImage(vid, -w, 0, w, h);
  ctx.restore();
  return c.toDataURL('image/jpeg', 0.65); // JPEG quality 65 — good balance
}

// ── rAF render loop — ONLY draws, never awaits network ───
function renderLoop(ts) {
  if (!stream) return;

  const vid    = document.getElementById('videoEl');
  const canvas = document.getElementById('canvasEl');
  const ctx    = canvas.getContext('2d');

  if (!vid.videoWidth) {
    animFrame = requestAnimationFrame(renderLoop);
    return;
  }

  canvas.width  = vid.videoWidth;
  canvas.height = vid.videoHeight;

  // 1. Draw raw mirrored video — always smooth regardless of server
  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(vid, -canvas.width, 0, canvas.width, canvas.height);
  ctx.restore();

  // 2. Overlay last makeup result (no awaiting — use whatever we have)
  if (lastMakeupImg) {
    if (!showBA) {
      ctx.drawImage(lastMakeupImg, 0, 0, canvas.width, canvas.height);
    } else {
      // Before/After split
      const splitX = Math.floor(canvas.width / 2);
      ctx.save();
      ctx.beginPath();
      ctx.rect(splitX, 0, canvas.width - splitX, canvas.height);
      ctx.clip();
      ctx.drawImage(lastMakeupImg, 0, 0, canvas.width, canvas.height);
      ctx.restore();
      // Split line
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.lineWidth   = 1.5;
      ctx.beginPath(); ctx.moveTo(splitX, 0); ctx.lineTo(splitX, canvas.height); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.font = '13px "DM Sans", sans-serif';
      ctx.fillText('BEFORE', 14,         28);
      ctx.fillText('AFTER',  splitX + 14, 28);
    }
  }

  // 3. FPS counter — measures actual display rate, not server rate
  const now  = performance.now();
  const diff = now - lastFrameT;
  if (diff > 0) {
    fpsSmooth = fpsSmooth * 0.9 + (1000 / diff) * 0.1;
    document.getElementById('fpsBadge').textContent = Math.round(fpsSmooth) + ' fps';
  }
  lastFrameT = now;

  animFrame = requestAnimationFrame(renderLoop);
}

// ── Push loop — fire-and-forget, completely decoupled ────
function startPushLoop() {
  if (pushInterval) return;
  // Push every 100ms (10 fps max send rate) — server processes as fast as it can
  // This is separate from the 60fps display loop
  pushInterval = setInterval(async () => {
    if (!stream || !sseConnected) return;
    const vid = document.getElementById('videoEl');
    if (!vid.videoWidth) return;

    const imageData = captureScaledFrame(vid, sendWidth);
    try {
      const resp = await fetch('/api/stream/push', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        // keepalive: true ensures the request completes even if page navigates
        body: JSON.stringify({ image: imageData, params: state }),
        signal: AbortSignal.timeout(3000),  // 3s max — never hang
      });
      if (resp.ok) {
        const data = await resp.json();
        // Server tells us optimal send resolution based on its latency
        if (data.send_width && data.send_width !== sendWidth) {
          sendWidth = data.send_width;
        }
      }
    } catch(e) {
      // Network hiccup — silent, try again next interval
    }
  }, 100);
}

function stopPushLoop() {
  if (pushInterval) { clearInterval(pushInterval); pushInterval = null; }
}

// ── SSE listener — receives processed results ─────────────
function startSSE() {
  if (sseSource) return;

  sseSource = new EventSource('/api/stream');

  sseSource.onopen = () => {
    sseConnected = true;
    document.getElementById('processingBadge').style.display = 'flex';
    log.debug?.('SSE connected');
  };

  sseSource.onmessage = (evt) => {
    if (!evt.data || evt.data.startsWith(':')) return;  // heartbeat
    try {
      const data = JSON.parse(evt.data);
      if (!data.result) return;

      // Update latency badge
      avgMs = data.avg_ms ?? avgMs;
      const lb = document.getElementById('latencyBadge');
      lb.textContent = `${data.ms}ms`;
      lb.className   = 'latency-badge' +
                       (avgMs > 200 ? ' bad' : avgMs > 100 ? ' slow' : '');

      // Adopt adaptive send width from server recommendation
      if (data.send_width) sendWidth = data.send_width;

      // Load result image in background — draw on next rAF tick
      lastResult = data.result;
      const img = new Image();
      img.onload = () => { lastMakeupImg = img; };
      img.onerror = () => {};   // never crash on bad data
      img.src = data.result;

    } catch(e) { /* malformed JSON — ignore */ }
  };

  sseSource.onerror = () => {
    sseConnected = false;
    // Browser auto-reconnects EventSource — no manual retry needed
    // But we show the badge as "connecting" state
    document.getElementById('processingBadge').style.display = 'none';
  };
}

function stopSSE() {
  if (sseSource) { sseSource.close(); sseSource = null; }
  sseConnected = false;
  document.getElementById('processingBadge').style.display = 'none';
}

// ════════════════════════════════════════════════════════
//  CAMERA CONTROL
// ════════════════════════════════════════════════════════
function switchMode(m) {
  mode = m;
  document.getElementById('tabCamera').classList.toggle('active', m === 'camera');
  document.getElementById('tabPhoto').classList.toggle('active', m === 'photo');
  document.getElementById('cameraControls').style.display = m === 'camera' ? 'flex' : 'none';
  document.getElementById('photoControls').style.display  = m === 'photo'  ? 'flex' : 'none';
  if (m === 'camera') {
    document.getElementById('photoImg').style.display  = 'none';
    document.getElementById('canvasEl').style.display  = 'block';
  } else {
    stopCamera();
    document.getElementById('canvasEl').style.display = 'none';
  }
}

async function startCamera() {
  try {
    // Request highest quality — we'll downscale for sending but display native
    stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
      audio: false,
    });
    const vid = document.getElementById('videoEl');
    vid.srcObject = stream;
    await vid.play();

    document.getElementById('startBtn').style.display      = 'none';
    document.getElementById('stopBtn').style.display       = 'flex';
    document.getElementById('screenshotBtn').style.display = 'flex';
    document.getElementById('placeholder').style.display   = 'none';
    document.getElementById('fpsBadge').style.display      = 'block';
    document.getElementById('latencyBadge').style.display  = 'block';

    // Start all three loops — they are fully independent
    animFrame = requestAnimationFrame(renderLoop);   // 60fps display
    startSSE();                                       // result receiver
    startPushLoop();                                  // frame sender

    toast('Camera started');
  } catch(e) {
    toast('Camera error: ' + e.message);
  }
}

function stopCamera() {
  stopPushLoop();
  stopSSE();

  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }

  lastMakeupImg = null;
  sendWidth     = 480;   // reset to conservative default
  fpsSmooth     = 0;

  document.getElementById('startBtn').style.display      = 'flex';
  document.getElementById('stopBtn').style.display       = 'none';
  document.getElementById('screenshotBtn').style.display = 'none';
  document.getElementById('fpsBadge').style.display      = 'none';
  document.getElementById('latencyBadge').style.display  = 'none';
  document.getElementById('canvasEl').style.display      = 'block';
}

// ════════════════════════════════════════════════════════
//  PHOTO MODE
// ════════════════════════════════════════════════════════
let lastRawPhotoDataUrl = null;

async function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('photoImg');
    img.src = ev.target.result;
    img.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    lastRawPhotoDataUrl = ev.target.result;
  };
  reader.readAsDataURL(file);

  await applyPhotoToServer(file);
}

async function applyPhotoToServer(file) {
  document.getElementById('processingBadge').style.display = 'flex';
  const fd = new FormData();
  fd.append('file', file);
  fd.append('params', JSON.stringify(state));
  try {
    const resp = await fetch('/api/photo', { method: 'POST', body: fd });
    if (resp.ok) {
      const data = await resp.json();
      if (data.result) {
        lastResult = data.result;
        document.getElementById('photoImg').src = data.result;
        document.getElementById('photoSaveBtn').style.display = 'flex';
        toast(`Processed in ${data.ms}ms`);
      }
    } else {
      const err = await resp.json().catch(()=>({}));
      toast('Error: ' + (err.error || 'Unknown'));
    }
  } catch(e) {
    toast('Network error');
  } finally {
    document.getElementById('processingBadge').style.display = 'none';
  }
}

let _reapplyTimer = null;
async function reapplyPhoto() {
  if (!lastRawPhotoDataUrl) return;
  clearTimeout(_reapplyTimer);
  _reapplyTimer = setTimeout(async () => {
    // Convert data URL back to File and resubmit
    const res   = await fetch(lastRawPhotoDataUrl);
    const blob  = await res.blob();
    const file  = new File([blob], 'reapply.jpg', { type: 'image/jpeg' });
    await applyPhotoToServer(file);
  }, 200);
}

// ════════════════════════════════════════════════════════
//  SCREENSHOT
// ════════════════════════════════════════════════════════
async function saveScreenshot() {
  const imgData = mode === 'photo'
    ? document.getElementById('photoImg').src
    : document.getElementById('canvasEl').toDataURL('image/jpeg', 0.95);

  if (!imgData || imgData === 'data:,') { toast('Nothing to save'); return; }

  try {
    const resp = await fetch('/api/screenshot', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ image: imgData }),
    });
    const data = await resp.json();
    if (resp.ok) {
      const a = document.createElement('a');
      a.href = imgData; a.download = data.filename || 'makeup.jpg'; a.click();
      toast('Saved: ' + data.filename);
    }
  } catch(e) {
    const a = document.createElement('a');
    a.href = imgData; a.download = 'makeup_' + Date.now() + '.jpg'; a.click();
  }
}

// ════════════════════════════════════════════════════════
//  STATE MANAGEMENT
// ════════════════════════════════════════════════════════
function updateParam(layer, key, value) {
  if (!state[layer]) state[layer] = {};
  state[layer][key] = value;
  if (mode === 'photo' && lastRawPhotoDataUrl) reapplyPhoto();
}

function applyLook(name) {
  const look = LOOKS[name];
  if (!look) return;
  Object.assign(state, JSON.parse(JSON.stringify(look)));

  const mapping = {
    lipstick:'togLipstick', lip_liner:'togLipLiner', eyeshadow:'togEyeshadow',
    eyebrow:'togEyebrow', blush:'togBlush', highlighter:'togHighlighter',
    contour:'togContour', foundation:'togFoundation',
  };
  for (const [layer, id] of Object.entries(mapping)) {
    const el = document.getElementById(id);
    if (el && state[layer]) el.checked = !!state[layer].enabled;
  }
  document.querySelectorAll('.look-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase() === name);
  });
  toast(name.charAt(0).toUpperCase() + name.slice(1) + ' look applied');
  if (mode === 'photo' && lastRawPhotoDataUrl) reapplyPhoto();
}

function toggleBA(on) { showBA = on; }

// ════════════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════════════
function toggleLayer(name) {
  document.getElementById('layer' + name)?.classList.toggle('open');
}

function buildSwatches() {
  const sections = [
    { id:'swatchesLipstick',  layer:'lipstick',  key:'lipstick'  },
    { id:'swatchesEyeshadow', layer:'eyeshadow', key:'eyeshadow' },
    { id:'swatchesEyebrow',   layer:'eyebrow',   key:'eyebrow'   },
    { id:'swatchesBlush',     layer:'blush',     key:'blush'     },
  ];
  for (const { id, layer, key } of sections) {
    const container = document.getElementById(id);
    if (!container || !PRESETS[key]) continue;
    container.innerHTML = '';
    let isFirst = true;
    for (const [name, preset] of Object.entries(PRESETS[key])) {
      const s = document.createElement('div');
      s.className    = 'swatch' + (isFirst ? ' active' : '');
      s.style.background = preset.hex;
      s.title        = preset.label;
      s.onclick = () => {
        container.querySelectorAll('.swatch').forEach(sw => sw.classList.remove('active'));
        s.classList.add('active');
        updateParam(layer, 'color', preset.bgr);
        if (layer === 'lipstick') updateParam('lip_liner', 'color', preset.bgr);
      };
      container.appendChild(s);
      isFirst = false;
    }
  }
}

let _toastTimer = null;
function toast(msg, duration = 2800) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ════════════════════════════════════════════════════════
//  HEALTH CHECK
// ════════════════════════════════════════════════════════
async function checkHealth() {
  try {
    const r = await fetch('/health');
    const d = await r.json();
    const ok = d.status === 'ok' && d.engine;
    document.getElementById('engineStatus').className = 'status-dot' + (ok ? '' : ' offline');
    document.getElementById('engineLabel').textContent = ok ? 'Engine ready' : 'Engine offline';
  } catch(e) {
    document.getElementById('engineStatus').className = 'status-dot offline';
    document.getElementById('engineLabel').textContent = 'Server offline';
  }
}

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  buildSwatches();
  checkHealth();
  setInterval(checkHealth, 15000);

  // Clean up SSE/streams when tab is hidden or closed
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && stream) {
      stopPushLoop();   // stop sending frames when tab is hidden
    } else if (!document.hidden && stream) {
      startPushLoop();  // resume when tab becomes visible again
    }
  });
  window.addEventListener('beforeunload', () => {
    stopCamera();
  });
});
</script>
